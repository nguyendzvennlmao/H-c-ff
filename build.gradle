// 1. Khai báo repository cho công cụ build
buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // Sử dụng phiên bản AGP ổn định
        classpath 'com.android.tools.build:gradle:8.2.2'
    }
}

// 2. Repository cho các thư viện ứng dụng
allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

// 3. Áp dụng Plugin (Chỉ khai báo ở đây)
apply plugin: 'com.android.application'

// 4. Cấu hình Android
android {
    namespace 'com.venn.lmao.xd'
    compileSdk 34
    
    defaultConfig {
        applicationId "com.venn.lmao.xd"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    // Thiết lập đường dẫn code vì cấu trúc thư mục của bạn không chuẩn
    sourceSets {
        main {
            manifest.srcFile 'app/src/main/AndroidManifest.xml'
            java.srcDirs = ['app/src/main/java']
            res.srcDirs = ['app/src/main/res']
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
        }
    }
    
    // Thêm tùy chọn này để tránh xung đột tài nguyên
    packagingOptions {
        resources {
            excludes += '/META-INF/{AL2.0,LGPL2.1}'
        }
    }
}

// 5. Dependencies (Đặt ở cuối cùng)
dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
}

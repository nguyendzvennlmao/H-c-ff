// 1. Cấu hình Plugin và Buildscript (Luôn để ở trên cùng)
buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.2.2'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

// 2. Apply Plugin
apply plugin: 'com.android.application'

// 3. Cấu hình Android
android {
    namespace 'com.venn.lmao.xd'
    compileSdk 34
    
    defaultConfig {
        applicationId "com.venn.lmao.xd"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    // Chỉ định đường dẫn file vì bạn không dùng cấu trúc thư mục chuẩn
    sourceSets {
        main {
            manifest.srcFile 'app/src/main/AndroidManifest.xml'
            java.srcDirs = ['app/src/main/java']
            res.srcDirs = ['app/src/main/res']
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
        }
    }
}

// 4. Dependencies (Luôn để ở cuối cùng)
dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
}
